<section class="container mt-5">
  <h2>İletişim</h2>
  <p class="mb-3">Benimle iletişime geçmek için aşağıdaki formu doldurabilirsiniz.</p>

  <form class="w-50">
    <div class="mb-3">
      <label for="name" class="form-label">Adınız</label>
      <input type="text" class="form-control" id="name" placeholder="Adınızı girin">
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">E-posta</label>
      <input type="email" class="form-control" id="email" placeholder="ornek@mail.com">
    </div>
    <div class="mb-3">
      <label for="message" class="form-label">Mesajınız</label>
      <textarea class="form-control" id="message" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Gönder</button>
  </form>

  <div class="mt-4">
    <p class="text-muted">Ayrıca sosyal medya hesaplarımdan da ulaşabilirsiniz:</p>
    <a href="#" class="me-2"><i class="bi bi-github"></i> GitHub</a>
    <a href="#" class="me-2"><i class="bi bi-linkedin"></i> LinkedIn</a>
  </div>
</section>
